            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        }

        .main-container {
            max-width: 1100px;

        }

        .activity-card {

            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);

        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 30px 35px;
            color: white;
        }

        .school-name {
            font-family: 'Nunito', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: rgba(255,255,255,0.15);
            padding: 20px 25px;
            border-radius: 20px;
        }

        .info-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-field label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.85;
        }

        .info-field input, .info-field select {
            background: white;
            border: none;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            font-family: inherit;
        }

        .info-field input[readonly] {
            background: #eef2ff;

        }

            font-family: 'Nunito', sans-serif;
            text-align: center;
            font-size: 1.8rem;

            margin-top: 20px;
            letter-spacing: 0.5px;
        }

        .content {
            padding: 30px 35px;
            background: #f8fafc;
        }

        .question-card {
            background: white;
            border-radius: 24px;
            margin-bottom: 24px;

            border: 1px solid #e2e8f0;
            transition: box-shadow 0.2s;
        }

        .question-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.11);
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 24px 0;
            flex-wrap: wrap;
        }

        .question-number {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* ─── IMAGEM DA QUESTÃO ─── */

        /* Container com imagem real — fundo branco/cinza claro para diagramas */
        .question-image-wrapper {
            width: 100%;
            background: #f0f4f8;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px 24px 0;
            gap: 0;
        }

        .question-image-wrapper img {
            max-width: 100%;
            max-height: 300px;
            width: auto;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
            background: white;
        }

        /* Badge de label abaixo da imagem */
        .image-label-badge {
            display: inline-block;
            margin: 10px auto 14px;
            background: #1e3c72;
            color: white;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 0.4px;
        }

        /* Placeholder quando não há imagem (emoji) */
        .question-image-wrapper.placeholder {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-bottom: none;
            min-height: 100px;
            justify-content: center;
            flex-direction: column;
            gap: 6px;
            padding: 22px 24px;
        }

        .placeholder-emoji {
            font-size: 3rem;
            line-height: 1;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
        }

        .placeholder-title {
            color: rgba(255,255,255,0.9);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .placeholder-caption {
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            text-align: center;
        }

        /* Simulador iframe */
        .simulator-wrapper {
            width: 100%;
            background: #0f172a;
            position: relative;
        }

        .simulator-wrapper iframe {
            display: block;
            width: 100%;
            height: 480px;
            border: none;
        }

        .simulator-label {
            position: absolute;
            top: 10px;
            left: 14px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            color: #38bdf8;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 5;
            letter-spacing: 0.5px;
        }

        /* ─── CORPO DA QUESTÃO ─── */
        .question-body {
            padding: 20px 24px 22px;
        }

        .question-text {
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 18px;
            background: #f1f5f9;
            padding: 14px 18px;
            border-radius: 16px;
            border-left: 4px solid #3b82f6;
        }

        .alternatives-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alternative-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: #f8fafc;
            padding: 11px 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1.5px solid #e2e8f0;
        }

        .alternative-item:hover {
            background: #eff6ff;
            border-color: #93c5fd;
            transform: translateX(3px);
        }

        .alternative-item.selected {
            background: #1f7a5a;
            border-color: #0a4a36;
            transform: translateY(1px);
        }

        .alternative-item.selected .alternative-text {
            color: white;
        }

        .alternative-item input[type="radio"] {
            margin-top: 2px;
            width: 17px;
            height: 17px;
            cursor: pointer;
            accent-color: #1f7a5a;
            flex-shrink: 0;
        }

        .alternative-text {
            font-size: 0.93rem;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.4;
            flex: 1;
        }

        /* ─── BOTÃO ENVIAR ─── */
        .submit-area {
            margin-top: 40px;
            text-align: center;
            padding: 20px 0 10px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #1f7a5a, #0f5e44);
            border: none;
            padding: 16px 48px;
            font-size: 1.15rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 14px rgba(31, 122, 90, 0.3);
        }

        .btn-submit:hover {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(31, 122, 90, 0.4);
        }

        .btn-submit:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 20px;
            padding: 14px 20px;
            border-radius: 16px;
            font-weight: 600;
            display: none;
        }

        .status-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;

        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        }

        .footer {
            background: #f1f5f9;
            padding: 20px 35px;
            text-align: center;
            font-size: 0.7rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 768px) {
            .content { padding: 16px; }

        }
    </style>
</head>

    // ==================== RENDERIZAÇÃO DAS QUESTÕES ====================
    function renderImageBlock(q, idx) {
        // Caso especial: simulador PhET
        if (q.simulator && q.simulatorUrl) {
            return `
                <div class="simulator-wrapper">
                    <div class="simulator-label">🧪 ${q.imageCaption}</div>
                    <iframe
                        src="${q.simulatorUrl}"
                        allowfullscreen
                        title="Simulador PhET - ${q.imageTitle}"
                        loading="lazy">
                    </iframe>
                </div>`;
        }

        // Imagem real
        if (q.imageUrl && q.imageUrl.trim() !== '') {
            return `
                <div class="question-image-wrapper">
                    <img src="${q.imageUrl}"
                         alt="${q.imageTitle}"
                         loading="lazy"
                         onerror="this.parentElement.classList.add('placeholder'); this.remove();">
                    <span class="image-label-badge">📷 ${q.imageTitle} — ${q.imageCaption}</span>
                </div>`;
        }

        // Placeholder emoji
        return buildPlaceholder(q);
    }

    function buildPlaceholder(q) {
        return `<div class="question-image-wrapper placeholder">
                    <span class="placeholder-emoji">${q.imageEmoji}</span>
                    <span class="placeholder-title">${q.imageTitle}</span>
                    <span class="placeholder-caption">${q.imageCaption}</span>
                </div>`;
    }

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        let html = '';
        questoes.forEach((q, idx) => {
            html += `
                <div class="question-card" data-qidx="${idx}">
                    <div class="question-header">
                        <span class="question-number">QUESTÃO ${idx + 1}</span>
                    </div>
                    ${renderImageBlock(q, idx)}
                    <div class="question-body">
                        <div class="question-text">${q.text}</div>
                        <div class="alternatives-list">
                            ${q.options.map((opt, optIdx) => `
                                <div class="alternative-item" data-q="${idx}" data-val="${optIdx}">
                                    <input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}_opt${optIdx}">
                                    <span class="alternative-text">${String.fromCharCode(65 + optIdx)}. ${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        document.querySelectorAll('.alternative-item').forEach(item => {
            const radio = item.querySelector('input[type="radio"]');
            item.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') radio.checked = true;
                const parentCard = item.closest('.question-card');
                parentCard.querySelectorAll('.alternative-item').forEach(alt => alt.classList.remove('selected'));
                item.classList.add('selected');
            });
            radio.addEventListener('change', () => {
                if (radio.checked) {
                    item.closest('.question-card').querySelectorAll('.alternative-item').forEach(alt => alt.classList.remove('selected'));
                    item.classList.add('selected');
                }
            });
        });
    }

    renderQuestions();

    // ==================== ENVIO ====================
    function getRespostas() {
        return questoes.map((_, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            return sel ? parseInt(sel.value) : null;
        });
    }

    function showMessage(message, isSuccess) {
        const msgDiv = document.getElementById('statusMessage');
        msgDiv.textContent = message;
        msgDiv.className = `status-message ${isSuccess ? 'status-success' : 'status-error'}`;
        setTimeout(() => msgDiv.className = 'status-message', 5000);
    }

    async function enviarRespostas() {
        const aluno = alunoSelect.value;
        const numero = document.getElementById('numeroChamada').value;
        const serie = document.getElementById('serieInput').value;
        const data = dataInput.value;

        if (!aluno) { showMessage('❌ Selecione o nome do aluno antes de enviar.', false); return; }

        const respostas = getRespostas();
        let acertos = 0;
        const respostasDetalhadas = respostas.map((resp, idx) => {
            const isCorreta = (resp !== null && resp === questoes[idx].correct);
            if (isCorreta) acertos++;
            return {
                questao: idx + 1,
                respostaAluno: resp !== null ? String.fromCharCode(65 + resp) : 'N/A',
                correta: isCorreta,
                gabarito: String.fromCharCode(65 + questoes[idx].correct)
            };
        });

        const payload = {
            spreadsheetId: SPREADSHEET_ID,
            aluno, numero, turma: serie, data, acertos,
            total: questoes.length,
            percentual: Math.round((acertos / questoes.length) * 100),
            respostas: respostasDetalhadas
        };

        const btn = document.getElementById('enviarBtn');
        btn.disabled = true;
        btn.innerHTML = '📤 ENVIANDO... <span class="loading-spinner"></span>';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            showMessage(`✅ Respostas registradas! ${aluno} (Nº ${numero}) | Acertos: ${acertos}/${questoes.length} (${payload.percentual}%)`, true);
        } catch (error) {
            showMessage('❌ Erro ao enviar. Verifique sua conexão.', false);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '📤 ENVIAR RESPOSTAS';
        }
    }

    document.getElementById('enviarBtn').addEventListener('click', enviarRespostas);
</script>
